name: animated_streaming_markdown
description: "WIP Flutter package for incremental Markdown parsing and streaming UI rendering with tree-sitter."
version: 0.1.2
homepage: https://github.com/samnn152/streaming-markdown
repository: https://github.com/samnn152/streaming-markdown
issue_tracker: https://github.com/samnn152/streaming-markdown/issues
documentation: https://github.com/samnn152/streaming-markdown#readme

environment:
  sdk: ^3.10.8
  flutter: '>=3.3.0'

dependencies:
  flutter:
    sdk: flutter
  ffi: ^2.1.3
  webview_flutter: ^4.13.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  plugin:
    platforms:
      android:
        ffiPlugin: true
      ios:
        ffiPlugin: true
      linux:
        ffiPlugin: true
      macos:
        ffiPlugin: true
      windows:
        ffiPlugin: true
