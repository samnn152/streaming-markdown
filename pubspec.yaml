name: animated_streaming_markdown
description: "Flutter markdown streaming package for Android/iOS/macOS/Linux/Windows (web is not supported)."
version: 0.3.3
homepage: https://samnn.dev
repository: https://github.com/samnn152/streaming-markdown
issue_tracker: https://github.com/samnn152/streaming-markdown/issues
documentation: https://samnn.dev
topics:
  - markdown
  - streaming
  - flutter
  - animation
  - tree-sitter

environment:
  sdk: '>=2.17.0 <4.0.0'
  flutter: '>=3.0.0'

dependencies:
  flutter:
    sdk: flutter
  ffi: '>=2.0.1 <3.0.0'
  html: '>=0.15.0 <0.16.0'

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: '>=2.0.0 <7.0.0'

flutter:
  plugin:
    platforms:
      android:
        ffiPlugin: true
      ios:
        ffiPlugin: true
      linux:
        ffiPlugin: true
      macos:
        ffiPlugin: true
      windows:
        ffiPlugin: true
